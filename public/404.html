<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Balanceum</title>
    <script>
      // GitHub Pages SPA redirect: encode the current path into a query param
      // and redirect to the app root so React Router can handle it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?r=' + encodeURIComponent(l.pathname.split('/').slice(2).join('/')) +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
